<nav class="fixed w-full z-50 bg-white/90 backdrop-blur-sm border-b border-black/5">
  <div class="max-w-screen-2xl mx-auto px-6 lg:px-12">
    <div class="flex justify-between items-center h-20 md:h-24">
      <a routerLink="/" class="text-xl md:text-2xl tracking-tighter text-emerald-950">
        OASIS<span class="font-bold">CLUB</span>
      </a>

      <div class="hidden md:flex space-x-12">
        <a routerLink="/" routerLinkActive="text-emerald-900 before:scale-x-100"
          [routerLinkActiveOptions]="{exact: true}"
          class="relative text-xs font-semibold tracking-[0.2em] text-gray-400 hover:text-emerald-900 uppercase transition-colors before:content-[''] before:absolute before:-bottom-2 before:left-0 before:w-full before:h-[1px] before:bg-emerald-900 before:scale-x-0 before:origin-left before:transition-transform hover:before:scale-x-100">
          Inicio
        </a>
        @if (auth.isLoggedIn()) {
        <a routerLink="/reservar" routerLinkActive="text-emerald-900 before:scale-x-100"
          class="relative text-xs font-semibold tracking-[0.2em] text-gray-400 hover:text-emerald-900 uppercase transition-colors before:content-[''] before:absolute before:-bottom-2 before:left-0 before:w-full before:h-[1px] before:bg-emerald-900 before:scale-x-0 before:origin-left before:transition-transform hover:before:scale-x-100">
          Reservar
        </a>
        <a routerLink="/gimnasio" routerLinkActive="text-emerald-900 before:scale-x-100"
          class="relative text-xs font-semibold tracking-[0.2em] text-gray-400 hover:text-emerald-900 uppercase transition-colors before:content-[''] before:absolute before:-bottom-2 before:left-0 before:w-full before:h-[1px] before:bg-emerald-900 before:scale-x-0 before:origin-left before:transition-transform hover:before:scale-x-100">
          Gimnasio
        </a>

        <a routerLink="/perfil" routerLinkActive="text-emerald-900 before:scale-x-100"
          class="relative text-xs font-semibold tracking-[0.2em] text-gray-400 hover:text-emerald-900 uppercase transition-colors before:content-[''] before:absolute before:-bottom-2 before:left-0 before:w-full before:h-[1px] before:bg-emerald-900 before:scale-x-0 before:origin-left before:transition-transform hover:before:scale-x-100">
          Mi Área
        </a>
        }
      </div>

      <div class="flex items-center space-x-6">
        @if (auth.isLoggedIn()) {
        <button (click)="logout()"
          class="hidden md:block text-xs font-semibold tracking-[0.15em] uppercase text-gray-400 hover:text-emerald-950 transition-colors">
          Salir
        </button>
        <a routerLink="/perfil"
          class="hidden md:flex items-center gap-2 text-xs font-semibold tracking-[0.15em] uppercase text-emerald-950 hover:text-emerald-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
            </path>
          </svg>
          Perfil
        </a>
        } @else {
        <a routerLink="/login"
          class="hidden md:block text-xs font-semibold tracking-[0.15em] uppercase text-emerald-950 hover:text-emerald-800 transition-colors">
          Acceder
        </a>
        }

        <button (click)="isMobileMenuOpen.set(!isMobileMenuOpen())"
          class="md:hidden p-2 text-emerald-950 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (isMobileMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path>
            } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path>
            }
          </svg>
        </button>
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
  <div
    class="md:hidden bg-white border-t border-black/5 px-6 py-8 flex flex-col space-y-6 shadow-xl absolute w-full left-0 top-full">
    <a routerLink="/" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-semibold tracking-[0.2em] text-gray-400 uppercase hover:text-emerald-950">Inicio</a>
    @if (auth.isLoggedIn()) {
    <a routerLink="/reservar" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-semibold tracking-[0.2em] text-gray-400 uppercase hover:text-emerald-950">Reservar</a>
    <a routerLink="/gimnasio" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-semibold tracking-[0.2em] text-gray-400 uppercase hover:text-emerald-950">Gimnasio</a>

    <a routerLink="/perfil" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-semibold tracking-[0.2em] text-gray-400 uppercase hover:text-emerald-950">Mi Área</a>
    <hr class="border-black/5">
    <a routerLink="/perfil" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-semibold tracking-[0.2em] text-emerald-950 uppercase">Perfil</a>
    <button (click)="logout()"
      class="text-left text-sm font-semibold tracking-[0.2em] text-gray-400 uppercase hover:text-emerald-950">Salir</button>
    } @else {
    <hr class="border-black/5">
    <a routerLink="/login" (click)="isMobileMenuOpen.set(false)"
      class="text-sm font-semibold tracking-[0.2em] text-emerald-950 uppercase">Acceder</a>
    }
  </div>
  }
</nav>
