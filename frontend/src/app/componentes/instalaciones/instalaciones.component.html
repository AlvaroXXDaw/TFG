@if (facility(); as f) {
  <div class="min-h-screen bg-white pt-24">
    <div class="w-full h-[60vh] relative">
      <img [src]="f.heroImage" [alt]="f.title + ' Premium'" class="w-full h-full object-cover" referrerpolicy="no-referrer">
      <div class="absolute inset-0 bg-emerald-950/40"></div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-white p-6 text-center">
        <span class="text-xs font-semibold tracking-[0.3em] uppercase mb-4">Instalaciones</span>
        <h1 class="text-6xl lg:text-8xl font-light tracking-tighter uppercase">{{ f.title }}</h1>
      </div>
    </div>

    <div class="max-w-screen-xl mx-auto px-6 lg:px-12 py-24">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center mb-24">
        <div>
          <h2 class="text-3xl font-light tracking-tight text-emerald-950 mb-6">{{ f.subtitle }}</h2>
          <p class="text-gray-500 font-light leading-relaxed mb-6">{{ f.description }}</p>
          <ul class="space-y-4 border-t border-black/5 pt-6">
            @for (feature of f.features; track feature) {
              <li class="flex items-center text-sm text-emerald-950">
                <span class="w-1.5 h-1.5 bg-emerald-950 rounded-full mr-3"></span>
                {{ feature }}
              </li>
            }
          </ul>
          <div class="mt-10">
            <a [routerLink]="f.ctaRoute" class="inline-block bg-emerald-950 text-white px-8 py-4 text-xs font-semibold tracking-[0.2em] uppercase hover:bg-emerald-900 transition-colors">{{ f.ctaText }}</a>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          @for (img of f.detailImages; track img.src; let i = $index) {
            <img [src]="img.src" [alt]="img.alt" class="w-full aspect-square object-cover" [class.mt-8]="i === 1" referrerpolicy="no-referrer">
          }
        </div>
      </div>
    </div>
  </div>
}
