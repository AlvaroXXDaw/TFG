    <div class="min-h-screen bg-white flex flex-col justify-center relative">
      <a routerLink="/login" class="absolute top-8 left-6 lg:left-12 flex items-center text-xs font-semibold tracking-[0.2em] uppercase text-gray-400 hover:text-emerald-950 transition-colors">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Volver al login
      </a>

      <div class="w-full max-w-md mx-auto px-6">

        <div class="mb-16 text-center">
          <h2 class="text-4xl font-light tracking-tighter text-emerald-950 uppercase mb-4">
            Crear cuenta
          </h2>
          <p class="text-sm font-light text-gray-500">
            Únete al club y empieza a reservar.
          </p>
        </div>

        <form class="space-y-8" (ngSubmit)="submitRegister()">
          <div class="relative">
            <input [(ngModel)]="name" name="name" type="text" id="name" class="block w-full border-0 border-b border-gray-200 py-4 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors" placeholder="Nombre" required>
            <label for="name" class="absolute left-0 -top-3.5 text-xs font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-4 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-xs peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
              Nombre completo
            </label>
          </div>

          <div class="relative">
            <input [(ngModel)]="email" name="email" type="email" id="email" class="block w-full border-0 border-b border-gray-200 py-4 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors" placeholder="Correo" required>
            <label for="email" class="absolute left-0 -top-3.5 text-xs font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-4 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-xs peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
              Correo electrónico
            </label>
          </div>

          <div class="relative">
            <input [(ngModel)]="phone" name="phone" type="tel" id="phone" class="block w-full border-0 border-b border-gray-200 py-4 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors" placeholder="Teléfono" required>
            <label for="phone" class="absolute left-0 -top-3.5 text-xs font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-4 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-xs peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
              Teléfono
            </label>
          </div>

          <div class="relative">
            <input [(ngModel)]="birthDate" name="birthDate" type="date" id="birthDate" class="block w-full border-0 border-b border-gray-200 py-4 text-emerald-950 focus:border-emerald-950 focus:ring-0 bg-transparent transition-colors" required>
            <label for="birthDate" class="absolute left-0 -top-3.5 text-xs font-semibold tracking-[0.1em] text-gray-400 uppercase">
              Fecha de nacimiento
            </label>
          </div>

          <div class="relative">
            <input [(ngModel)]="password" name="password" type="password" id="password" class="block w-full border-0 border-b border-gray-200 py-4 text-emerald-950 placeholder-transparent focus:border-emerald-950 focus:ring-0 peer bg-transparent transition-colors" placeholder="Contraseña" required>
            <label for="password" class="absolute left-0 -top-3.5 text-xs font-semibold tracking-[0.1em] text-gray-400 uppercase transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-4 peer-placeholder-shown:font-light peer-placeholder-shown:tracking-normal peer-focus:-top-3.5 peer-focus:text-xs peer-focus:font-semibold peer-focus:tracking-[0.1em] peer-focus:text-emerald-950">
              Contraseña (mín. 6 caracteres)
            </label>
          </div>

          @if (errorMessage()) {
            <div class="flex items-center gap-2 text-sm text-red-500 pt-2">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              <span class="font-light">{{ errorMessage() }}</span>
            </div>
          }

          <button [disabled]="loading()" type="submit" class="w-full bg-emerald-950 text-white py-5 text-xs font-semibold tracking-[0.2em] uppercase hover:bg-emerald-900 transition-colors mt-8 disabled:opacity-60 disabled:cursor-not-allowed">
            @if (loading()) {
              Creando cuenta...
            } @else {
              Crear cuenta
            }
          </button>
        </form>

        <div class="mt-16 text-center">
          <a routerLink="/login" class="text-xs font-semibold tracking-[0.1em] uppercase text-gray-400 hover:text-emerald-950 transition-colors border-b border-transparent hover:border-emerald-950 pb-1">
            ¿Ya tienes cuenta? Inicia sesión
          </a>
        </div>

      </div>
    </div>
